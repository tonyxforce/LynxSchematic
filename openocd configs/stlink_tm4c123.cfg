# Interface configuration for ST-Link
source [find interface/stlink.cfg]

# Force SWD transport mode
transport select hla_swd

# Keep speed stable for flashing
adapter speed 500

# Overwrite expected TAP ID to match new silicon revision
set CPUTAPID 0x2ba01477

# Hardware target configurations
set WORKAREASIZE 0x8000
set CHIPNAME tm4c123gh6pge
source [find target/stellaris.cfg]