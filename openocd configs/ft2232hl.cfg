proc binToDec {inBinary} {
    if { [string range $inBinary 0 1] != "0b" } {
        return ""
    }

    set inBinary [string map {" " ""} [string range $inBinary 2 end]]
    set number 0
    set i 0
    while {$inBinary != ""} {
        set char [string range $inBinary end end]
        if { $char == "1" } {
            set number [expr {$number + (2 ** $i)}]
        } elseif { $char != "0"} {
            puts "Invalid character \"$char\" at position $i."
            exit 1
        }

        incr i
        set inBinary [string range $inBinary 0 end-1]
    }

    return $number
};

#modified from https://mcuoneclipse.com/2019/10/20/jtag-debugging-the-esp32-with-ft2232-and-openocd/

adapter driver ftdi
ftdi vid_pid 0x0403 0x6010

# # SWD adapter only supports up to 400 KHz due to slow pull up resistors, but JTAG can take the full 500

if {![info exists ftdi_transport]} {
    puts {ERROR: $ftdi_transport not defined}
    shutdown
} elseif { $ftdi_transport == "JTAG" } {
    transport select jtag
    adapter speed 500
    ftdi channel 0
} elseif { $ftdi_transport == "SWD" } {
    transport select swd
    adapter speed 400
    ftdi channel 1
} else {
    puts [string cat {ERROR: invalid $ftdi_transport of "} $ftdi_transport "\". Valid transports are \"JTAG\" and \"SWD\"." ]
    shutdown
}

# From documentation:
# A special case is provided when -data and -oe is set to the same bitmask.
#  Then the FTDI pin is considered being connected straight to the target without any buffer.
#  The FTDI pin is then switched between output and input as necessary to provide the full set of low,
#  high and Hi-Z characteristics. In all other cases, the pins specified in a signal definition are
#  always driven by the FTDI.

# Layout signals. Arg one is the inital data. Arg 2 is the direction. Bits 0-3 are reserved for the TCK, TDI, TDO, and TMS. The rest can be used for other signals
# ftdi layout_init 0x0038 0x003b
ftdi layout_init [binToDec "0b00000000 00111000"] [binToDec "0b00000000 01111011"]
ftdi layout_signal nTRST -oe [binToDec "0b00000000 00010000"] -ndata [binToDec "0b00000000 00010000"]
ftdi layout_signal nSRST -oe [binToDec "0b00000000 00100000"] -ndata [binToDec "0b00000000 00100000"]
ftdi layout_signal SWDIO_OE -data [binToDec "0b00000000 01000000"]
ftdi layout_signal SWD_EN -data 0x0

# ftdi layout_signal nTRST -noe 0x0010
# ftdi layout_signal nTRST -noe 0x0010

#Pinout- all on ADBUS
# 0 - TCLK
# 1 - TDI (from ftdi to device)
# 2 - TDO (from device to ftdi)
# 3 - TMS
# 4 - TRST (active low)
# 5 - SRST (active low)
# 6 - SWDIO_EN (active high)